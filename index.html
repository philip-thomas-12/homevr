<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Virtual Property Explorer</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

</head>

<body>

<a-scene>

<a-assets>
<a-asset-item id="house" src="scene.gltf"></a-asset-item>
</a-assets>

<a-entity 
gltf-model="#house"
position="0 0 -5"
scale="1 1 1">
</a-entity>

<a-entity 
camera
position="0 1.6 5"
wasd-controls
look-controls>
</a-entity>

<a-sky color="#ECECEC"></a-sky>

</a-scene>

</body>
</html>
